<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" fill="none">
  <defs>
    <style>
      .bg { fill: #0f1219; }
      .card { fill: #1c1828; stroke: #b794f6; stroke-width: 1; rx: 6; }
      .header { fill: #0f0d16; }
      .text { fill: #ece9e1; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
      .mono { fill: #a39ab4; font-family: 'JetBrains Mono', 'SF Mono', Consolas, monospace; }
      .purple { fill: #b794f6; }
      .orange { fill: #e8864a; }
      .green { fill: #6dd4a0; }
      .dim { fill: #6f6884; }
      .border { stroke: rgba(255,231,200,0.14); stroke-width: 1; }
      .watermark { fill: #b794f6; opacity: 0.15; font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: 2px; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="800" height="460"/>

  <!-- Card outline -->
  <rect class="card" x="20" y="20" width="760" height="420"/>

  <!-- Header bar -->
  <rect class="header" x="21" y="21" width="758" height="52" rx="5"/>
  <text class="mono" x="40" y="50" font-size="11">kulshan report v0.4.2</text>
  <text class="text" x="200" y="50" font-size="13" font-weight="600">AWS Cost Investigation: Network Spend Movement</text>
  <text class="mono" x="620" y="50" font-size="10">SYNTHETIC SAMPLE</text>

  <!-- Divider -->
  <line class="border" x1="21" y1="73" x2="779" y2="73"/>

  <!-- Grid: 2x3 -->
  <!-- Row 1 -->
  <rect fill="#1c1828" x="21" y="74" width="253" height="120"/>
  <line class="border" x1="274" y1="74" x2="274" y2="194"/>
  <rect fill="#1c1828" x="274" y="74" width="253" height="120"/>
  <line class="border" x1="527" y1="74" x2="527" y2="194"/>
  <rect fill="#1c1828" x="527" y="74" width="252" height="120"/>

  <text class="orange" x="36" y="100" font-size="9" font-family="monospace" letter-spacing="1">QUESTION INVESTIGATED</text>
  <text class="text" x="36" y="122" font-size="12">Why did network-related spend</text>
  <text class="text" x="36" y="140" font-size="12">increase 34% month-over-month</text>
  <text class="text" x="36" y="158" font-size="12">in the platform account?</text>

  <text class="orange" x="289" y="100" font-size="9" font-family="monospace" letter-spacing="1">EXECUTIVE CONCLUSION</text>
  <text class="text" x="289" y="122" font-size="12">NAT Gateway data processing is</text>
  <text class="text" x="289" y="140" font-size="12">the primary contributor. Source</text>
  <text class="text" x="289" y="158" font-size="12">workload not yet identified.</text>

  <text class="green" x="542" y="100" font-size="9" font-family="monospace" letter-spacing="1">SUPPORTING EVIDENCE</text>
  <text class="text" x="542" y="122" font-size="12">Cost Explorer service breakdown,</text>
  <text class="text" x="542" y="140" font-size="12">usage-type anomaly (z-score 2.7),</text>
  <text class="text" x="542" y="158" font-size="12">NAT Gateway bytes processed.</text>

  <!-- Row divider -->
  <line class="border" x1="21" y1="194" x2="779" y2="194"/>

  <!-- Row 2 -->
  <rect fill="#1c1828" x="21" y="195" width="253" height="120"/>
  <line class="border" x1="274" y1="195" x2="274" y2="315"/>
  <rect fill="#1c1828" x="274" y="195" width="253" height="120"/>
  <line class="border" x1="527" y1="195" x2="527" y2="315"/>
  <rect fill="#1c1828" x="527" y="195" width="252" height="120"/>

  <text fill="#e85a5a" x="36" y="221" font-size="9" font-family="monospace" letter-spacing="1">CONTRADICTING / INCOMPLETE</text>
  <text class="text" x="36" y="243" font-size="12">No VPC Flow Log evidence.</text>
  <text class="text" x="36" y="261" font-size="12">No tag-based ownership. Cannot</text>
  <text class="text" x="36" y="279" font-size="12">confirm intra-region vs cross-AZ.</text>

  <text class="purple" x="289" y="221" font-size="9" font-family="monospace" letter-spacing="1">OWNERSHIP CONFIDENCE</text>
  <text class="orange" x="289" y="243" font-size="12" font-weight="600">Low.</text>
  <text class="text" x="318" y="243" font-size="12">Account identified.</text>
  <text class="text" x="289" y="261" font-size="12">Workload and team owner not yet</text>
  <text class="text" x="289" y="279" font-size="12">resolved from available evidence.</text>

  <text class="purple" x="542" y="221" font-size="9" font-family="monospace" letter-spacing="1">RECOMMENDED NEXT STEP</text>
  <text class="text" x="542" y="243" font-size="12">Enable VPC Flow Logs on the</text>
  <text class="text" x="542" y="261" font-size="12">platform VPC. Reconcile NAT</text>
  <text class="text" x="542" y="279" font-size="12">Gateway ENI. Then re-run.</text>

  <!-- Bottom bar -->
  <line class="border" x1="21" y1="315" x2="779" y2="315"/>
  <rect fill="#0f0d16" x="21" y="316" width="758" height="36" rx="0"/>
  <text class="mono" x="36" y="339" font-size="10">Findings: </text><text class="text" x="93" y="339" font-size="10">7</text>
  <text class="mono" x="130" y="339" font-size="10">Could not check: </text><text class="orange" x="240" y="339" font-size="10">2</text>
  <text class="mono" x="280" y="339" font-size="10">Coverage: </text><text class="green" x="341" y="339" font-size="10">83%</text>
  <text class="mono" x="400" y="339" font-size="10">Score: </text><text class="text" x="444" y="339" font-size="10">62/100</text>
  <text class="mono" x="520" y="339" font-size="10">Human review required: </text><text class="orange" x="660" y="339" font-size="10">yes</text>

  <!-- Watermark -->
  <text class="watermark" x="280" y="395" transform="rotate(-5, 400, 395)">SYNTHETIC SAMPLE - NOT CUSTOMER DATA</text>

  <!-- Bottom credit -->
  <text class="dim" x="36" y="425" font-size="10" font-family="monospace">missionfinops.com/sample · kulshan v0.4.2 · Apache 2.0</text>
</svg>
